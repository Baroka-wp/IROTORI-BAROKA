name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # permet de déclencher manuellement depuis GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build l'image Docker et la pousse sur GitHub Container Registry
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # nécessaire pour pousser sur ghcr.io

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Docker exige un nom d'image tout en minuscules
      - name: Mettre IMAGE_NAME en minuscules
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Déploiement sur le VPS
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (pour récupérer docker-compose.yml)
        uses: actions/checkout@v4

      # Docker exige un nom d'image tout en minuscules
      - name: Mettre IMAGE_NAME en minuscules
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Copier docker-compose.yml sur le VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   docker-compose.yml
          target:   /opt/irotori-baroka/

      - name: Déployer (pull + restart)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE:              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR:           ${{ github.actor }}
          APP_PORT:           ${{ secrets.APP_PORT }}
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          JWT_SECRET:         ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL:        ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD:     ${{ secrets.ADMIN_PASSWORD }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          BREVO_API_KEY:      ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          APP_URL:            ${{ secrets.APP_URL }}
          SITE_URL:           ${{ secrets.SITE_URL }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs:     IMAGE,GH_TOKEN,GH_ACTOR,APP_PORT,DATABASE_URL,JWT_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD,GEMINI_API_KEY,BREVO_API_KEY,BREVO_SENDER_EMAIL,APP_URL,SITE_URL
          script: |
            set -e
            mkdir -p /opt/irotori-baroka
            cd /opt/irotori-baroka

            # ── Écrire le .env ────────────────────────────────────────────────
            printf "IMAGE=%s\n"               "$IMAGE"               > .env
            printf "PORT=%s\n"               "${APP_PORT:-3000}"    >> .env
            printf "DATABASE_URL=%s\n"        "$DATABASE_URL"        >> .env
            printf "JWT_SECRET=%s\n"          "$JWT_SECRET"          >> .env
            printf "ADMIN_EMAIL=%s\n"         "$ADMIN_EMAIL"         >> .env
            printf "ADMIN_PASSWORD=%s\n"      "$ADMIN_PASSWORD"      >> .env
            printf "GEMINI_API_KEY=%s\n"      "$GEMINI_API_KEY"      >> .env
            printf "BREVO_API_KEY=%s\n"       "$BREVO_API_KEY"       >> .env
            printf "BREVO_SENDER_EMAIL=%s\n"  "$BREVO_SENDER_EMAIL"  >> .env
            printf "APP_URL=%s\n"             "$APP_URL"             >> .env
            printf "SITE_URL=%s\n"            "$SITE_URL"            >> .env

            # ── Connexion à ghcr.io ──────────────────────────────────────────
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # ── Purge des snapshots containerd corrompus (prévient les erreurs
            #    Lchown/overlayfs lors du pull de grosses images comme Prisma) ──
            docker image rm "$IMAGE" 2>/dev/null || true
            docker system prune -f

            # ── Pull de la nouvelle image ────────────────────────────────────
            docker compose pull

            # ── Redémarrage sans interruption ───────────────────────────────
            docker compose up -d --remove-orphans

            # ── Nettoyage des anciennes images ───────────────────────────────
            docker image prune -f

            echo "✅ Déploiement terminé — $(date)"
